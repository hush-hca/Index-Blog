<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <style>
      .logo-text { font-family: 'Inter', -apple-system, sans-serif; font-weight: 800; font-size: 38px; fill: #111827; }
    </style>
    <linearGradient id="linkeasy-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#02231c" />
      <stop offset="60%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#10B981" flood-opacity="0.15"/>
    </filter>
  </defs>
  <g transform="translate(10, 10)">
    <g filter="url(#glow)">
      <path d="M 45 25 
               C 25 25, 20 45, 20 60 
               C 20 75, 30 85, 45 85 
               C 65 85, 70 50, 85 45 
               C 95 42, 105 50, 105 60 
               C 105 72, 95 85, 80 85" 
            fill="none" 
            stroke="url(#linkeasy-grad)" 
            stroke-width="12" 
            stroke-linecap="round" 
            stroke-linejoin="round"/>
      <path d="M 85 30 L 100 45 L 75 55" 
            fill="none" 
            stroke="#10B981" 
            stroke-width="5" 
            stroke-linecap="round" 
            stroke-linejoin="round"/>
      <circle cx="45" cy="60" r="5" fill="#34D399" />
    </g>
    <text x="135" y="70" class="logo-text">
      Link<tspan fill="#10B981">Easy</tspan>
    </text>
  </g>
</svg>
